server {
	listen 80;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;
	absolute_redirect off;

	error_page 404 /404.html;

	location = / {
		try_files /index.html =404;
	}

	location = /favicon.jpg {
		try_files /assets/poka-ne-zabyl-logo.jpg =404;
	}

	location = /manifest.webmanifest {
		default_type application/manifest+json;
		try_files /manifest.webmanifest =404;
	}

	location = /sw.js {
		add_header Cache-Control "no-cache" always;
		try_files /sw.js =404;
	}

	location ~ ^/(offer|privacy|consent|refunds)/$ {
		return 301 /$1;
	}

	location ~ ^/(offer|privacy|consent|refunds)$ {
		try_files $uri.html =404;
	}

	location = /app {
		add_header X-Robots-Tag "noindex, nofollow" always;
		try_files /app.html =404;
	}

	location = /payment/success {
		add_header X-Robots-Tag "noindex, nofollow" always;
		try_files /payment-success.html =404;
	}

	location = /payment/failed {
		add_header X-Robots-Tag "noindex, nofollow" always;
		try_files /payment-failed.html =404;
	}

	location = /404.html {
		internal;
	}

	location / {
		try_files $uri =404;
	}
}
