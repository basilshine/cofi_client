server {
	listen 80;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;
	absolute_redirect off;
	add_header X-Content-Type-Options "nosniff" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;

	error_page 404 /404.html;

	location = / {
		try_files /index.html =404;
	}

	location = /favicon.svg {
		try_files /assets/poka-ne-zabyl-logo.svg =404;
	}

	location = /manifest.webmanifest {
		default_type application/manifest+json;
		try_files /manifest.webmanifest =404;
	}

	location = /sw.js {
		expires -1;
		try_files /sw.js =404;
	}

	location ~ ^/(offer|privacy|consent|refunds)/$ {
		return 301 /$1;
	}

	location ~ ^/(offer|privacy|consent|refunds)$ {
		try_files $uri.html =404;
	}

	location = /app {
		try_files /app.html =404;
	}

	location = /join {
		try_files /app.html =404;
	}

	location = /payment/success {
		try_files /payment-success.html =404;
	}

	location = /payment/failed {
		try_files /payment-failed.html =404;
	}

	location = /404.html {
		internal;
	}

	location / {
		try_files $uri =404;
	}
}
