# T4/T5 — Quality gate for @cofi/web + shared API package (see cofi_brain/tasks/frontend-multiapp-foundation.md)
name: Web CI

on:
  push:
    branches: [main, master]
    paths:
      - "apps/web/**"
      - "packages/api/**"
      - "package.json"
      - "package-lock.json"
      - "biome.json"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "apps/web/**"
      - "packages/api/**"
      - "package.json"
      - "package-lock.json"
      - "biome.json"
      - ".github/workflows/web-ci.yml"

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (web + packages/api)
        run: npm run lint:web

      - name: Production build (tsc + vite)
        run: npm run build:web
        env:
          # Vite may read env at build time; CI does not need a real API
          VITE_API_URL: "http://127.0.0.1:8000"
